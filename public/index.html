<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FlashLog CRM</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .btn-edit { background: none; border: none; cursor: pointer; font-size: 1.2rem; }
        .btn-delete { background: none; border: none; cursor: pointer; font-size: 1.2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #181612; color: #F26800; }
    </style>
</head>
<body>
    <nav style="background: #181612; padding: 15px; display: flex; gap: 20px;">
        <h2 style="color: #F26800; margin: 0; margin-right: 20px;">FLASH LOG</h2>
        <a href="#" onclick="showSection('cadastro')" style="color: white; text-decoration: none;">Clientes</a>
        <a href="#" onclick="showSection('chamado')" style="color: white; text-decoration: none;">Lançar Chamado</a>
        <a href="#" onclick="showSection('relatorio')" style="color: white; text-decoration: none;">Relatórios</a>
    </nav>

    <main style="padding: 20px;">
        <section id="cadastro" style="display:none;">
            <h2>Gerenciar Clientes</h2>
            <form id="formCliente">
                <input type="text" id="nome" placeholder="Nome da Empresa" required>
                <input type="text" id="cnpj" placeholder="CNPJ" required>
                <button type="submit">Salvar</button>
            </form>
        </section>

        <section id="chamado" style="display:none;">
            <h2>Lançar Serviço</h2>
            <form id="formChamado">
                <select id="selectCliente" required></select><br><br>
                <input type="date" id="data_manual" required><br><br>
                <input type="text" id="responsavel_servico" placeholder="Solicitante" required><br><br>
                <input type="text" id="rota" placeholder="Rota" required><br><br>
                <input type="number" id="valor" placeholder="Valor R$" step="0.01" required><br><br>
                <input type="text" id="descricao_servico" placeholder="Observação"><br><br>
                <button type="submit">Registrar</button>
            </form>
        </section>

        <section id="relatorio">
            <h2>Relatório de Produção</h2>
            <select id="filtroCliente"></select>
            <input type="date" id="dataInicio">
            <input type="date" id="dataFim">
            <button onclick="visualizarRelatorio()" style="background:#F26800; color:white; border:none; padding:10px; cursor:pointer;">Ver Prévia</button>
            <button onclick="gerarRelatorioPDF()" style="background:#333; color:white; border:none; padding:10px; cursor:pointer;">Gerar PDF</button>

            <table id="tabelaPrevia" style="display:none;">
                <thead>
                    <tr><th>Data</th><th>Rota</th><th>Valor</th><th>Solicitante</th><th>Ações</th></tr>
                </thead>
                <tbody id="corpoPrevia"></tbody>
                <tfoot id="pePrevia"></tfoot>
            </table>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
