<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashLog CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <b class="brand">FLASH LOG</b>
            <div class="menu">
                <a onclick="showSection('cadastro')">Clientes</a>
                <a onclick="showSection('chamado')">Novo Chamado</a>
                <a onclick="showSection('relatorio')">Relatórios</a>
            </div>
        </div>
    </nav>

    <main>
        <section id="cadastro" style="display:none;">
            <h2>Cadastro de Clientes</h2>
            <form id="formCliente" class="card">
                <input type="text" id="nome" placeholder="Nome da Empresa" required>
                <input type="text" id="cnpj" placeholder="CNPJ" required>
                <button type="submit" class="btn-save">Salvar Cliente</button>
            </form>
        </section>

        <section id="chamado" style="display:none;">
            <h2>Registrar Serviço</h2>
            <form id="formChamado" class="card">
                <label>Cliente:</label>
                <select id="selectCliente" required></select>
                
                <label>Data:</label>
                <input type="date" id="data_manual" required>
                
                <label>Solicitante:</label>
                <input type="text" id="responsavel_servico" placeholder="Quem pediu o serviço?" required>
                
                <label>Rota:</label>
                <input type="text" id="rota" placeholder="Ex: Olinda -> Recife" required>
                
                <label>Valor (R$):</label>
                <input type="number" id="valor" placeholder="0.00" step="0.01" required>
                
                <label>Observação:</label>
                <input type="text" id="descricao_servico" placeholder="Detalhes opcionais">
                
                <button type="submit" class="btn-save">Registrar Chamado</button>
            </form>
        </section>

        <section id="relatorio">
            <h2>Relatórios de Produção</h2>
            <div class="filter-bar card">
                <select id="filtroCliente"></select>
                <input type="date" id="dataInicio">
                <input type="date" id="dataFim">
                <div class="actions">
                    <button onclick="visualizarRelatorio()" class="btn-view">Ver Prévia</button>
                    <button onclick="gerarRelatorioPDF()" class="btn-pdf">Gerar PDF</button>
                </div>
            </div>

            <table id="tabelaPrevia" style="display:none;">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Rota</th>
                        <th>Valor</th>
                        <th>Solicitante</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpoPrevia"></tbody>
                <tfoot id="pePrevia"></tfoot>
            </table>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
